name: pi-agent-workforce

x-agent-build: &agent-build
  context: src/agents
  dockerfile: Dockerfile

x-agent: &agent
  restart: unless-stopped
  env_file: .env
  deploy:
    resources:
      limits:
        memory: 512M

x-project-volume: &project-volume
  ./project:/project:ro

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-pi-agent-workforce}"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-artifact-db.sql:/docker-entrypoint-initdb.d/init-artifact-db.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  minio:
    image: minio/minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-minioadmin}"
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb --ignore-existing local/artifacts;
      mc mb --ignore-existing local/logs;
      mc mb --ignore-existing local/state;
      echo 'buckets ready';
      "
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-minioadmin}"

  artifact-service:
    build:
      context: src
      dockerfile: artifact-service/Dockerfile
    restart: unless-stopped
    ports:
      - "8090:8090"
    environment:
      PORT: "8090"
      DATABASE_URL: "postgres://artifact:artifact-eval@postgres:5432/artifact_store"
      S3_ENDPOINT: "http://minio:9000"
      S3_ACCESS_KEY: "${MINIO_ROOT_USER:-minioadmin}"
      S3_SECRET_KEY: "${MINIO_ROOT_PASSWORD:-minioadmin}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
    volumes:
      - ./src/agents/rbac.json:/app/rbac.json:ro
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:8090/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      start_period: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M

  openobserve:
    image: public.ecr.aws/zinclabs/openobserve:latest
    restart: unless-stopped
    ports:
      - "5080:5080"
    environment:
      ZO_ROOT_USER_EMAIL: "${ZO_ROOT_USER_EMAIL:-admin@example.com}"
      ZO_ROOT_USER_PASSWORD: "${ZO_ROOT_USER_PASSWORD:-pi-agent-workforce}"
      ZO_DATA_DIR: "/data"
    volumes:
      - openobserve-data:/data
    deploy:
      resources:
        limits:
          memory: 512M

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    restart: unless-stopped
    command: ["--config=/etc/otelcol/config.yaml"]
    environment:
      ZO_OTLP_AUTH: "${ZO_OTLP_AUTH}"
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      - openobserve
    deploy:
      resources:
        limits:
          memory: 128M

  marquez-api:
    image: marquezproject/marquez:latest
    restart: unless-stopped
    ports:
      - "5000:5000"
      - "5001:5001"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: marquez
      POSTGRES_USER: marquez
      POSTGRES_PASSWORD: marquez
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/v1/namespaces"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  marquez-web:
    image: marquezproject/marquez-web:latest
    restart: unless-stopped
    ports:
      - "3002:3000"
    depends_on:
      marquez-api:
        condition: service_healthy
    environment:
      MARQUEZ_HOST: marquez-api
      MARQUEZ_PORT: "5000"
      WEB_PORT: "3000"
    deploy:
      resources:
        limits:
          memory: 128M

  planner:
    <<: *agent
    build:
      <<: *agent-build
      target: planner
    ports:
      - "8081:8080"
    env_file:
      - .env
      - src/agents/planner/.env
    environment:
      AGENT_NAME: "planner"
      WORKSPACE: "default"
      ARTIFACT_SERVICE_URL: "http://artifact-service:8090"
      MARQUEZ_URL: "http://marquez-api:5000"
      BRIDGE_TIMEOUT_MS: "1800000"
      MAX_CONCURRENT_SESSIONS: "1"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
    depends_on:
      artifact-service:
        condition: service_healthy
      researcher:
        condition: service_healthy
      writer:
        condition: service_healthy
      publisher:
        condition: service_healthy

  researcher:
    <<: *agent
    build:
      <<: *agent-build
      target: researcher
    ports:
      - "8082:8080"
    env_file:
      - .env
      - src/agents/researcher/.env
    environment:
      AGENT_NAME: "researcher"
      WORKSPACE: "default"
      NVIDIA_NIM_API_KEY: "${NVIDIA_NIM_API_KEY}"
      FINDING_STYLE: "intelligence"
      ARTIFACT_SERVICE_URL: "http://artifact-service:8090"
      MARQUEZ_URL: "http://marquez-api:5000"
      BRIDGE_TIMEOUT_MS: "600000"
      MAX_CONCURRENT_SESSIONS: "3"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
    volumes:
      - researcher-workspace:/workspace
    depends_on:
      artifact-service:
        condition: service_healthy

  data:
    <<: *agent
    build:
      <<: *agent-build
      target: data
    ports:
      - "8083:8080"
    env_file:
      - .env
      - src/agents/data/.env
    environment:
      AGENT_NAME: "data"
      WORKSPACE: "default"
      GROQ_API_KEY: "${GROQ_API_KEY}"
      NVIDIA_NIM_API_KEY: "${NVIDIA_NIM_API_KEY}"
      FINDING_STYLE: "data"
      ARTIFACT_SERVICE_URL: "http://artifact-service:8090"
      MARQUEZ_URL: "http://marquez-api:5000"
      BRIDGE_TIMEOUT_MS: "600000"
      MAX_CONCURRENT_SESSIONS: "2"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
    deploy:
      resources:
        limits:
          memory: 2G
    volumes:
      - data-workspace:/workspace
      - ./project:/project:ro
    depends_on:
      artifact-service:
        condition: service_healthy

  writer:
    <<: *agent
    build:
      <<: *agent-build
      target: writer
    ports:
      - "8084:8080"
    env_file:
      - .env
      - src/agents/writer/.env
    environment:
      AGENT_NAME: "writer"
      WORKSPACE: "default"
      ARTIFACT_SERVICE_URL: "http://artifact-service:8090"
      MARQUEZ_URL: "http://marquez-api:5000"
      BRIDGE_TIMEOUT_MS: "600000"
      MAX_CONCURRENT_SESSIONS: "2"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
    deploy:
      resources:
        limits:
          memory: 1G
    volumes:
      - writer-workspace:/workspace
    depends_on:
      artifact-service:
        condition: service_healthy

  publisher:
    <<: *agent
    build:
      <<: *agent-build
      target: publisher
    ports:
      - "8085:8080"
    env_file:
      - .env
      - src/agents/publisher/.env
    environment:
      AGENT_NAME: "publisher"
      WORKSPACE: "default"
      ARTIFACT_SERVICE_URL: "http://artifact-service:8090"
      MARQUEZ_URL: "http://marquez-api:5000"
      BRIDGE_TIMEOUT_MS: "600000"
      MAX_CONCURRENT_SESSIONS: "2"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
    volumes:
      - publisher-workspace:/workspace
      - ./project:/project:ro
    depends_on:
      artifact-service:
        condition: service_healthy

  coder:
    <<: *agent
    build:
      <<: *agent-build
      target: coder
    ports:
      - "8086:8080"
    env_file:
      - .env
    environment:
      AGENT_NAME: "coder"
      WORKSPACE: "default"
      ARTIFACT_SERVICE_URL: "http://artifact-service:8090"
      MARQUEZ_URL: "http://marquez-api:5000"
      BRIDGE_TIMEOUT_MS: "600000"
      MAX_CONCURRENT_SESSIONS: "2"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
    deploy:
      resources:
        limits:
          memory: 4G
    volumes:
      - coder-workspace:/workspace
      - ./project:/project:ro
    depends_on:
      artifact-service:
        condition: service_healthy

  qa:
    <<: *agent
    build:
      <<: *agent-build
      target: qa
    ports:
      - "8087:8080"
    env_file:
      - .env
    environment:
      AGENT_NAME: "qa"
      WORKSPACE: "default"
      ARTIFACT_SERVICE_URL: "http://artifact-service:8090"
      MARQUEZ_URL: "http://marquez-api:5000"
      BRIDGE_TIMEOUT_MS: "600000"
      MAX_CONCURRENT_SESSIONS: "2"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
    volumes:
      - qa-workspace:/workspace
    depends_on:
      artifact-service:
        condition: service_healthy

volumes:
  postgres-data:
    name: pi-agent-workforce-postgres-data
  minio-data:
    name: pi-agent-workforce-minio-data
  researcher-workspace:
    name: pi-agent-workforce-researcher-workspace
  data-workspace:
    name: pi-agent-workforce-data-workspace
  writer-workspace:
    name: pi-agent-workforce-writer-workspace
  publisher-workspace:
    name: pi-agent-workforce-publisher-workspace
  coder-workspace:
    name: pi-agent-workforce-coder-workspace
  qa-workspace:
    name: pi-agent-workforce-qa-workspace
  openobserve-data:
