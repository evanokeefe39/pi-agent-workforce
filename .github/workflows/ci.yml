name: CI

on:
  push:
    branches: [master]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "tasks/**"
      - "LICENSE"
  pull_request:
    branches: [master]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "tasks/**"
      - "LICENSE"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        working-directory: src/agents

      - name: Unit tests
        run: bun test tests/unit/

      - name: Static E2E — content production infra
        run: bash tests/e2e/e2e-50-content-production-infra.sh

      - name: Static E2E — writer style tools
        run: bash tests/e2e/e2e-53-writer-style-tools.sh

      - name: Static E2E — QA agent infra
        run: bash tests/e2e/e2e-55-qa-agent-infra.sh
